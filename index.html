<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Milk Elegant</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f9f9f9;
  color: #333;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #1f2937;
  color: white;
}

nav h1 {
  color: #facc15;
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin-left: 20px;
}

nav ul li a {
  color: white;
  text-decoration: none;
  font-weight: 500;
}

nav ul li a:hover {
  color: #facc15;
}

/* HOME / HERO */
.home {
  height: 90vh;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
}

.home h2 {
  font-size: 40px;
}

.home p {
  margin-top: 10px;
  font-size: 18px;
}

/* SECTION */
.container {
  padding: 60px 30px;
}

/* PRODUCT GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
  gap: 25px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
}

.card-body h3 {
  margin-bottom: 8px;
}

.price {
  color: #16a34a;
  font-weight: bold;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #1f2937;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #facc15;
  color: black;
}

/* FOOTER */
footer {
  background: #1f2937;
  color: white;
  text-align: center;
  padding: 20px;
}

/* RESPONSIVE */
@media(max-width: 768px) {
  .home h2 {
    font-size: 28px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>Fresh Milk</h1>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#product">Produk</a></li>
    <li><a href="#contact">Kontak</a></li>
  </ul>
</nav>

<!-- HOME -->
<section class="home" id="home">
  <div>
    <h2>Susu Segar & Premium</h2>
    <p>Nikmati berbagai varian fresh milk berkualitas tinggi setiap hari 🥛</p>
  </div>
</section>

<!-- PRODUCT -->
<section class="container" id="product">
  <h2 style="text-align:center; margin-bottom:30px;">Produk Kami</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1563636619-e9143da7973b">
      <div class="card-body">
        <h3>Susu Original</h3>
        <p class="price">Rp10.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908554027-d1b8b0e5c5e3">
      <div class="card-body">
        <h3>Susu Cokelat</h3>
        <p class="price">Rp12.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1625944525533-473f1c8c79dc">
      <div class="card-body">
        <h3>Susu Strawberry</h3>
        <p class="price">Rp12.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1576186726115-4d51596775d1">
      <div class="card-body">
        <h3>Susu Vanilla</h3>
        <p class="price">Rp11.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer id="contact">
  <p>© 2026 Fresh Milk Premium</p>
</footer>

</body>
</html>
