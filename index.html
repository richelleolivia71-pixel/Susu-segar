<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Milk Store</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: #f5f7f9;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #2ecc71;
  padding: 15px 30px;
  color: white;
}

nav h1 {
  font-size: 22px;
}

nav ul {
  display: flex;
  list-style: none;
}

nav ul li {
  margin-left: 20px;
}

nav ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav ul li a:hover {
  opacity: 0.8;
}

/* HERO SLIDER */
.slider {
  position: relative;
  height: 300px;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  animation: slideShow 12s infinite;
}

.slide:nth-child(1) {
  background-image: url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b');
  animation-delay: 0s;
}

.slide:nth-child(2) {
  background-image: url('https://images.unsplash.com/photo-1604908176997-125f25cc6f3d');
  animation-delay: 4s;
}

.slide:nth-child(3) {
  background-image: url('https://images.unsplash.com/photo-1627483298606-6bfcdfde9c2f');
  animation-delay: 8s;
}

@keyframes slideShow {
  0% {opacity: 0;}
  10% {opacity: 1;}
  30% {opacity: 1;}
  40% {opacity: 0;}
  100% {opacity: 0;}
}

/* SECTION */
.container {
  padding: 40px 20px;
}

/* PRODUCT GRID */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
}

.card-body h3 {
  margin-bottom: 10px;
}

.price {
  color: #2ecc71;
  font-weight: bold;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border: none;
  background: #2ecc71;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #27ae60;
}

/* FOOTER */
footer {
  background: #333;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 30px;
}

/* RESPONSIVE NAV */
@media(max-width: 600px) {
  nav {
    flex-direction: column;
  }

  nav ul {
    margin-top: 10px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>Fresh Milk</h1>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#product">Produk</a></li>
    <li><a href="#contact">Kontak</a></li>
  </ul>
</nav>

<!-- SLIDER -->
<div class="slider">
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>

<!-- PRODUCT -->
<div class="container" id="product">
  <h2 style="text-align:center; margin-bottom:20px;">Produk Kami</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1563636619-e9143da7973b">
      <div class="card-body">
        <h3>Susu Original</h3>
        <p class="price">Rp10.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1604908554027-d1b8b0e5c5e3">
      <div class="card-body">
        <h3>Susu Coklat</h3>
        <p class="price">Rp12.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1625944525533-473f1c8c79dc">
      <div class="card-body">
        <h3>Susu Stroberi</h3>
        <p class="price">Rp12.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1576186726115-4d51596775d1">
      <div class="card-body">
        <h3>Susu Vanilla</h3>
        <p class="price">Rp11.000</p>
        <button onclick="alert('Ditambahkan ke keranjang')">Tambah ke Keranjang</button>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer id="contact">
  <p>© 2026 Fresh Milk Store</p>
</footer>

</body>
</html>
