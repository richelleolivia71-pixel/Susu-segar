<!-- DARK MODE BUTTON -->
<button id="darkToggle" style="
position:fixed;
bottom:20px;
right:20px;
padding:10px 15px;
border:none;
background:#facc15;
cursor:pointer;
z-index:999;
border-radius:8px;
">🌙</button>

<!-- BACK TO TOP -->
<button id="topBtn" style="
position:fixed;
bottom:70px;
right:20px;
padding:10px 15px;
border:none;
background:#111827;
color:white;
cursor:pointer;
display:none;
border-radius:8px;
z-index:999;
">⬆</button>

<style>
/* ANIMASI */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s ease;
}

.fade-in.show {
  opacity: 1;
  transform: translateY(0);
}

/* DARK MODE */
.dark-mode {
  background: #111827 !important;
  color: white;
}

.dark-mode .card {
  background: #1f2937;
  color: white;
}

.dark-mode nav {
  background: black;
}

html {
  scroll-behavior: smooth;
}
</style>

<script>
// DARK MODE
const toggle = document.getElementById("darkToggle");
toggle.onclick = () => {
  document.body.classList.toggle("dark-mode");
};

// ANIMASI SCROLL
const elements = document.querySelectorAll(".card, .about, h2");

window.addEventListener("scroll", () => {
  elements.forEach(el => {
    const pos = el.getBoundingClientRect().top;
    if (pos < window.innerHeight - 100) {
      el.classList.add("show", "fade-in");
    }
  });
});

// ALERT BUTTON
document.querySelectorAll("button").forEach(btn => {
  if (btn.innerText.includes("Keranjang")) {
    btn.addEventListener("click", () => {
      alert("Produk berhasil ditambahkan ke keranjang!");
    });
  }
});

// BACK TO TOP
const topBtn = document.getElementById("topBtn");

window.onscroll = () => {
  if (document.documentElement.scrollTop > 200) {
    topBtn.style.display = "block";
  } else {
    topBtn.style.display = "none";
  }
};

topBtn.onclick = () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
};
</script>
